<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Homam</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
        }
        .header p {
            font-size: 14px;
            color: #ccc;
            margin: 0;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #aaa;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        input, textarea {
            width: 100%;
            padding: 12px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid #555;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            border-bottom: 1px solid #fff;
        }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #000;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            margin-top: 20px;
        }
        .btn-submit:hover {
            background: #ccc;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #888;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="homam-title">Book Homam</h1>
            <p>Please enter your details below.</p>
        </div>
        <form id="homam-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="cust-name" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="cust-phone" pattern="[0-9]{10}" title="Must be exactly 10 digits" required>
            </div>
            <div class="form-group">
                <label>Building No / Street Name</label>
                <input type="text" id="cust-street" required>
            </div>
            <div class="form-group">
                <label>City / Address Details</label>
                <input type="text" id="cust-address" required>
            </div>
            <div class="form-group">
                <label>Pincode</label>
                <input type="text" id="cust-pincode" required>
            </div>
            <div class="form-group">
                <label>Purpose for Homam</label>
                <textarea id="cust-purpose" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn-submit">Proceed</button>
        </form>
        <a href="online-homam.html" class="back-link">← Back to Homams</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let homamName = urlParams.get('homam');
        if (homamName) {
            document.getElementById('homam-title').innerText = `Book ${homamName}`;
            document.title = `Book ${homamName}`;
        } else {
            homamName = 'a Homam';
        }

        document.getElementById('homam-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const street = document.getElementById('cust-street').value.trim();
            const address = document.getElementById('cust-address').value.trim();
            const pincode = document.getElementById('cust-pincode').value.trim();
            const purpose = document.getElementById('cust-purpose').value.trim();

            const message = `i want priest for homam

*Homam:* ${homamName}
*Name:* ${name}
*Phone:* ${phone}
*Address:* ${street}, ${address}
*Pincode:* ${pincode}
*Purpose:* ${purpose}`;

            const whatsappUrl = `https://wa.me/918148147056?text=${encodeURIComponent(message)}`;
            window.location.href = whatsappUrl;
        });
    </script>
</body>
</html>
