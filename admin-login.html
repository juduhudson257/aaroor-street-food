<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | The Divine Voice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary-gold: #000000;
            --primary-gold-dark: #333333;
            --background: #ffffff;
            --white: #ffffff;
            --text-dark: #000000;
            --text-secondary: #666666;
            --borders: #000000;
            --shadow-medium: 0 8px 30px rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: #fafafa !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        header {
            background-color: #ffffff !important;
            border-bottom: 1px solid #e0e0e0 !important;
        }

        .header-logo-img {
            filter: grayscale(100%);
            transition: filter 0.3s ease;
        }

        .header-logo-img:hover {
            filter: grayscale(0%);
        }

        .admin-login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            background-color: #fafafa;
            padding: 20px;
        }

        .admin-login-card {
            background: #ffffff;
            padding: 40px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .admin-login-card h2 {
            color: #000000;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
        }

        .admin-input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .admin-input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666666;
        }

        .admin-input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.95rem;
            color: #000000;
            background-color: #ffffff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .admin-input-group input:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
        }

        .admin-login-btn {
            width: 100%;
            padding: 14px;
            background: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .admin-login-btn:hover {
            background: #ffffff;
            color: #000000;
        }

        #login-error {
            color: #ff0000;
            margin-top: 15px;
            display: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .admin-exit-btn {
            color: #000000;
            border: 1px solid #000000;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .admin-exit-btn:hover {
            background: #000000;
            color: #ffffff;
        }

        .btn-link-sec {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            color: #666666;
            font-size: 0.9rem;
            text-decoration: none;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-link-sec:hover {
            color: #000000;
            border-color: #000000;
            background-color: #fafafa;
        }
    </style>
</head>

<body>
    <header>
        <div class="container header-container">
            <a href="index.html" class="brand-wrapper">
                <img src="divine logo.png" alt="The Divine Voice" class="header-logo-img">
            </a>
            <nav>
                <ul>
                    <li><a href="index.html" class="admin-exit-btn"><i class="fa-solid fa-xmark"></i> Exit</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="admin-login-container">
        <div class="admin-login-card">
            <h2>Admin Portal Access</h2>
            <form id="admin-login-form">
                <div class="admin-input-group">
                    <label for="admin-user">Username</label>
                    <input type="text" id="admin-user" required>
                </div>
                <div class="admin-input-group">
                    <label for="admin-pass">Password</label>
                    <input type="password" id="admin-pass" required>
                </div>
                <button type="submit" class="admin-login-btn">Login</button>
                <div id="login-error" style="color: #ff0000; margin-top: 15px; display: none;">Invalid credentials.
                    Please try again.</div>
            </form>

            <a href="index.html" class="btn-link-sec" style="color: #666666; border-color: #e0e0e0;">Exit</a>
        </div>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const user = document.getElementById('admin-user').value.trim();
            const pass = document.getElementById('admin-pass').value;

            // Hash the credentials with SHA-256 before comparing (credentials never exposed in plain-text)
            const encoder = new TextEncoder();
            const userHash = Array.from(
                new Uint8Array(await crypto.subtle.digest('SHA-256', encoder.encode(user)))
            ).map(b => b.toString(16).padStart(2, '0')).join('');
            const passHash = Array.from(
                new Uint8Array(await crypto.subtle.digest('SHA-256', encoder.encode(pass)))
            ).map(b => b.toString(16).padStart(2, '0')).join('');

            const validUserHash = 'b2f59e4c738cc98bcdb5b7da46b96dde4c9e34ec9aea6d1a3e1f14fef6be8b4c';
            const validPassHash = '3f2a1c6e6bba56fb4fdb9e8f4a3d5e7c3b2a1f8e9d6c5b4a3f2e1d0c9b8a7f6';

            if (userHash === validUserHash && passHash === validPassHash) {

                const token = Array.from(
                    new Uint8Array(await crypto.subtle.digest('SHA-256', encoder.encode(user + pass + Date.now())))
                ).map(b => b.toString(16).padStart(2, '0')).join('');
                sessionStorage.setItem('divine_admin_token', token);
                sessionStorage.setItem('divine_admin_auth', 'true');
                sessionStorage.setItem('divine_admin_ts', Date.now().toString());
                window.location.href = 'admin-dashboard.html';
            } else {
                document.getElementById('login-error').style.display = 'block';

                document.getElementById('admin-pass').value = '';
            }
        });
    </script>

</html>
